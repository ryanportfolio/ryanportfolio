# Test + eval gate. Repo-invariant checks (scripts/gate.mjs) + the app/
# Vitest suite and typecheck. Copy-pastable into other repos: swap the
# invariant script and test commands for your own.
name: gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Repo invariants
        run: node scripts/gate.mjs
      - name: Install app dependencies
        working-directory: app
        run: npm ci
      - name: Typecheck
        working-directory: app
        run: npm run typecheck
      - name: Tests
        working-directory: app
        run: npm test
